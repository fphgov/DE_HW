version: '3.8'

services:
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    depends_on:
      - postgres
    entrypoint: /bin/bash -c "
      airflow db init &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin"


  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow-webserver
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__BASE_URL=http://localhost:8081
      # - AIRFLOW__CORE__DAGS_FOLDER=/usr/local/airflow/dags # do I need this here?
      # - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/usr/local/airflow/logs
      - AIRFLOW__LOGGING__LOGGING_LEVEL=DEBUG
      # TODO: sort out secret key handling: smooth dev vs prod
      - AIRFLOW__WEBSERVER__SECRET_KEY=supersecretkey
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./packages:/usr/local/airflow/packages
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - airflow-init
    # do not install deps here! we did that in the Dockerfile
    entrypoint: /bin/bash -c "
      pip install --no-deps -e /usr/local/airflow/packages/template_package &&
      airflow webserver"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/usr/local/airflow/dags
      - AIRFLOW__CORE__BASE_URL=http://localhost:8081
      # - AIRFLOW__LOGGING__BASE_LOG_FOLDER=/usr/local/airflow/logs
      # TODO: sort out secret key handling: smooth dev vs prod
      - AIRFLOW__WEBSERVER__SECRET_KEY=supersecretkey
      # - AIRFLOW__LOGGING__LOGGING_LEVEL=DEBUG
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./packages:/usr/local/airflow/packages
    depends_on:
      - postgres
      - airflow-init
    # do not install deps here! we did that in the Dockerfile
    entrypoint: /bin/bash -c "
      pip install --no-deps -e /usr/local/airflow/packages/template_package &&
      airflow scheduler"

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: