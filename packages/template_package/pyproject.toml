[tool.poetry]
name = "template_package"
version = "0.1.0"
description = "template python package, do what you will, change, copy, remove, whatever"
authors = ["Venczeli József <venczeli.jozsef@budapest.hu>"]
readme = "README.md"
packages = [{include = "template_package"}]

[tool.poetry.dependencies]
python = ">=3.11,<3.14"
pandas = ">=2.1.2"
dotenv = ">=0.9.9"
python-json-logger = ">=3.3.0"
openpyxl = ">=3.1.2"
numpy = ">=1.26.0"
psycopg2-binary = ">=2.9.0"


[tool.poetry.group.dev.dependencies]
pytest = "^8.3.5"
pip-tools = "^7.5.3"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"